<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>MHDTVLIV Player</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: black;
      overflow: hidden;
    }

    #video {
      width: 100%;
      height: 100%;
      background: black;
    }

    #centerLogo {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 200px;
      opacity: 0.9;
      z-index: 10;
      pointer-events: none;
      transition: opacity 0.5s ease;
    }

    #logo {
      position: absolute;
      top: 10px;
      left: 10px;
      width: 100px;
      opacity: 0.8;
      z-index: 10;
    }

    #telegramLink {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 15;
      opacity: 0.8;
      transition: opacity 0.3s;
    }

    #telegramLink:hover {
      opacity: 1;
    }

    #tapToPlay {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      font-size: 20px;
      cursor: pointer;
      z-index: 20;
      background: rgba(0,0,0,0.5);
      padding: 10px 20px;
      border-radius: 8px;
    }
  </style>
</head>
<body>

  <!-- Small Logo -->
  <img id="logo" src="https://tv.mhdtvp.com/MHDTV.png" alt="MHDTVLIV logo">

  <!-- Center Logo -->
  <img id="centerLogo" src="https://tv.mhdtvp.com/MHDTV.png" alt="MHDTVLIV logo">

  <!-- Telegram Link -->
  <a id="telegramLink" href="https://t.me/mhdtvliveworld" target="_blank">
    <img src="https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg" 
         alt="Telegram" style="width:40px;height:40px;">
  </a>

  <!-- Video -->
  <video id="video" autoplay muted playsinline controls></video>

  <!-- Tap to Play Overlay -->
  <div id="tapToPlay">Tap to Play</div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const videoSrc = urlParams.get('url');

    if (!videoSrc) {
      alert("No video URL provided!");
    }

    const video = document.getElementById('video');
    const centerLogo = document.getElementById('centerLogo');
    const tapToPlay = document.getElementById('tapToPlay');

    let hls;

    function startPlayer() {
      if (!videoSrc) return;

      if (hls) {
        hls.destroy();
      }

      if (Hls.isSupported()) {
        hls = new Hls({
          maxBufferLength: 10,
          maxMaxBufferLength: 20
        });

        hls.loadSource(videoSrc);
        hls.attachMedia(video);

        hls.on(Hls.Events.MANIFEST_PARSED, () => video.play().catch(() => {}));
      } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = videoSrc;
        video.addEventListener('loadedmetadata', () => video.play().catch(() => {}));
      }
    }

    startPlayer();

    // Hide center logo when playing
    video.addEventListener('play', () => centerLogo.style.opacity = "0");
    video.addEventListener('pause', () => centerLogo.style.opacity = "0.9");

    // Tap to Play overlay
    tapToPlay.addEventListener('click', () => {
      video.muted = false;
      video.play().catch(() => {});
      tapToPlay.style.display = "none";
    });

    // Optional: remove overlay if user starts video another way
    video.addEventListener('play', () => {
      tapToPlay.style.display = "none";
    });
  </script>
</body>
</html>
